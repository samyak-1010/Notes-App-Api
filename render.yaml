services:
  - type: web
    name: notes-app
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: notes-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
